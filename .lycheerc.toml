exclude = [
  "https://www.gnu.org/licenses/",
  "https://www.gnu.org/licenses/agpl-3.0.html",
  # AGPL verbatim license header URL intermittently fails TLS handshakes on CI
  "https://fsf.org/",
  "https://www.makeareadme.com/",
  # DOI landing pages intermittently return transient resolver errors in automated checks
  "https://doi.org/10.3929/ethz-b-000726102",
  "https://doi.org/10.3929/ethz-b-000735240",
  # Conference subscribe endpoint is unstable for automated HEAD/GET checks
  "https://www.uantwerpen.be/en/conferences/30th-annual-international-conference-on-science-and-technology-indicators/subscribe-for-updates/",
  # Zenodo badge placeholders (not yet configured)
  "https://zenodo.org/badge/GITHUB_REPO_ID",
  "https://zenodo.org/badge/latestdoi/ZENODO_RECORD",
  # Disabled registration links for past events (rendered as strikethrough)
  "https://ema.uzh.ch/",
  "https://ethz.zoom.us/meeting/register/",
  "https://epfl.zoom.us/meeting/register/",
  # Python f-string URL templates in dashboard code (contain {identifier} placeholders)
  "https://www.wikidata.org/wiki/",
  "https://api.crossref.org/funders/",
  "https://www.geonames.org/",
  "https://isni.org/isni/",
]

exclude_path = [
  "dashboards/naif/hei.csv"
]

timeout = 20
max_retries = 3
format = "compact"
no_progress = true
cache = true
max_cache_age = "7d"
insecure = true
# DOI resolvers occasionally time out on CI even when the target record resolves.
accept = ["100..=103", "200..=299", "301..=303", "307..=308", "403", "408", "429", "503", "521", "522", "524"]
